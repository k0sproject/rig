$defs:
  SSH:
    additionalProperties: false
    properties:
      address:
        anyOf:
          - format: hostname
            type: string
          - format: ipv4
            type: string
          - format: ipv6
            type: string
        description: Address of the remote host (IP or hostname)
      bastion:
        $ref: '#/$defs/SSH'
        description: Optional bastion host
      hostKey:
        description: Optional known host key fingerprint
        type: string
      keyPath:
        description: Optional path to private key
        type: string
      port:
        default: 22
        description: SSH port (default 22)
        maximum: 65535
        minimum: 1
        type: integer
      user:
        default: root
        description: User to log in as
        minLength: 1
        type: string
    required:
      - address
    type: object
$id: https://github.com/k0sproject/rig/ssh
$ref: '#/$defs/SSH'
$schema: https://json-schema.org/draft/2020-12/schema
