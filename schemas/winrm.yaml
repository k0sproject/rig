$defs:
  SSH:
    additionalProperties: false
    properties:
      address:
        anyOf:
          - format: hostname
            type: string
          - format: ipv4
            type: string
          - format: ipv6
            type: string
        description: Address of the remote host (IP or hostname)
      bastion:
        $ref: '#/$defs/SSH'
        description: Optional bastion host
      hostKey:
        description: Optional known host key fingerprint
        type: string
      keyPath:
        description: Optional path to private key
        type: string
      port:
        default: 22
        description: SSH port (default 22)
        maximum: 65535
        minimum: 1
        type: integer
      user:
        default: root
        description: User to log in as
        minLength: 1
        type: string
    required:
      - address
    type: object
  WinRM:
    additionalProperties: false
    properties:
      address:
        anyOf:
          - format: hostname
            type: string
          - format: ipv4
            type: string
          - format: ipv6
            type: string
        description: Address of the remote host
      bastion:
        $ref: '#/$defs/SSH'
        description: Optional SSH bastion
      caCertPath:
        description: Path to CA certificate
        type: string
      certPath:
        description: Path to client certificate
        type: string
      insecure:
        default: false
        description: Accept invalid TLS certificates
        type: boolean
      keyPath:
        description: Path to client key
        type: string
      password:
        description: Password for WinRM authentication
        type: string
      port:
        default: 5985
        description: WinRM port
        maximum: 65535
        minimum: 1
        type: integer
      tlsServerName:
        anyOf:
          - format: hostname
            type: string
          - format: ipv4
            type: string
          - format: ipv6
            type: string
        description: TLS server name override
      useHTTPS:
        default: false
        description: Use HTTPS for WinRM
        type: boolean
      useNTLM:
        default: false
        description: Use NTLM authentication
        type: boolean
      user:
        default: Administrator
        description: User to authenticate as
        minLength: 3
        type: string
    required:
      - address
    type: object
$id: https://github.com/k0sproject/rig/win-rm
$ref: '#/$defs/WinRM'
$schema: https://json-schema.org/draft/2020-12/schema
