version: "2"
run:
  tests: false
  allow-parallel-runners: true
linters:
  default: all
  disable:
    - depguard
    - dogsled
    - embeddedstructfieldcheck
    - exhaustruct
    - forbidigo
    - funcorder
    - gochecknoglobals
    - gochecknoinits
    - godot
    - godox
    - goheader
    - ireturn
    - lll
    - mnd
    - nlreturn
    - noinlineerr
    - paralleltest
    - tagalign
    - tagliatelle
    - tparallel
    - wsl
    - wsl_v5
  settings:
    funlen:
      lines: 100
      statements: 75
    varnamelen:
      max-distance: 10
      ignore-decls:
        - w http.ResponseWriter
        - r *http.Request
        - i int
        - n int
        - p []byte
        - mu sync.Mutex
        - wg sync.WaitGroup
        - h Host
    cyclop:
      max-complexity: 12
  exclusions:
    generated: lax
    presets:
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
